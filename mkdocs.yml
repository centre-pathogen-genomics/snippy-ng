
site_name: snippy_ng
# repo_url: https://github.com/wytamma/write-the

nav:
  - Home: index.md
  - Installation:
      - installation/index.md
      - Clair3: installation/clair3.md
  - Report: report/index.md
  - GUI: gui.md
  - Development:
      - development/index.md
      - CLI: development/cli.md
      - Integration Tests: development/integration-tests.md
      - Pipelines: development/pipelines.md
      - Stages: development/stages.md

theme:
  name: "material"
  # homepage: https://write-the.wytamma.com
  # logo: assets/logo.png
  # favicon: images/favicon.png
  custom_dir: docs/overrides
  palette: 
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - toc.follow
    - navigation.indexes
    - content.action.edit

extra:
  social:
    - icon: fontawesome/solid/robot
      link: https://github.com/Wytamma/write-the
      name: Generated with write-the

plugins:
- search
- mkdocstrings:
    handlers:
      python:
        options:
          docstring_style: "google"

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
